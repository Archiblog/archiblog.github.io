<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Archiblog</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="frame">
    <header class="page-header">
      <h1><font color="red">ARCHI(tecture... ...we)BLOG</font>: Redefining it as Progressing</h1>
      <div class="subtitle"><h1><a href="https://github.com/Archiblog/archiblog.github.io">Repository</a></h1>
</div>
    </header>

    <!-- First pair block -->
    <section class="pair-block">
      <div class="pair-grid">

        <!-- Left panel -->
        <article class="panel">
          <div class="panel-inner">
            <div class="image-wrap">
              <img src="drawings/png/preview/poster.png" alt="Folkestone Conference 1967" />
            </div>

            <div class="notes">
              <p><span class="bullet">•</span>Poster, Folkeestone Conference, 1967. Source: Archigram.</a></p>
            <div class="button-row">
                <a class="buttonlink" href="https://www.designingbuildings.co.uk/wiki/The_Commons">Learn More</a>
                <a class="buttonlink" href="https://github.com/Archiblog/atom/blob/main/docs/Price%2C%20C.%20(1967)%20Atomia.pdf">PDF</a>
              </div>
            </div>
          </div>
        </article>

        <!-- Right panel -->
        <article class="panel">
          <div class="panel-inner">
            <div class="image-wrap">
              <img src="drawings/png/preview/cpsupplementcovers.png" alt="Cedric Price AD covers" />
            </div>

            <div class="notes">
              <p><span class="bullet">•</span> Collage of AD covers for issues containing Cedric Price Supplements</a></p>
             <div class="button-row">
                <a class="buttonlink" href="https://www.designingbuildings.co.uk/wiki/AD:_A_great_little_mag!">Learn More</a>
                <a class="buttonlink" href="#">PDF</a>
              </div>
            </div>
          </div>

      

      </div>
    </section>

  </main>

</html>
